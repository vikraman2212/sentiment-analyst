# Custom parser for structlog JSON output.
#
# structlog's JSONRenderer emits lines like:
#   {"event": "...", "level": "info", "timestamp": "2026-04-05T10:15:30.123456Z", ...}
#
# Time_Key maps "timestamp" → the Fluent Bit record time.
# Time_Keep On duplicates the parsed time into the OpenSearch document so
# OpenSearch Dashboards can build time-series visualisations without
# relying on the Fluent Bit ingestion time.

[PARSER]
    Name         json_app
    Format       json
    Time_Key     timestamp
    Time_Format  %Y-%m-%dT%H:%M:%S.%LZ
    Time_Keep    On
