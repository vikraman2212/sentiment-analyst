# Fluent Bit — container log shipping to OpenSearch
#
# Pipeline:
#   [INPUT:forward]  — receives structured JSON logs from Docker fluentd log driver
#   [FILTER:parser]  — parses the raw "log" field as JSON (structlog JSON renderer)
#   [FILTER:modify]  — promotes container_name to a top-level field
#   [OUTPUT:opensearch] — ships to sentiment-opensearch, index container-logs-YYYY.MM.DD

[SERVICE]
    Flush             5
    Log_Level         warn
    Daemon            off
    Parsers_File      parsers.conf
    # Built-in HTTP server — used by the Docker healthcheck
    HTTP_Server       On
    HTTP_Listen       0.0.0.0
    HTTP_Port         2020

[INPUT]
    Name              forward
    Listen            0.0.0.0
    Port              24224
    Buffer_Chunk_Size 1M
    Buffer_Max_Size   6M

# Parse the "log" key (raw stdout line) as JSON.
# structlog's JSONRenderer emits {"event": "...", "level": "...", "timestamp": "...", ...}
# Reserve_Data On keeps the Docker metadata (container_name, source, etc.)
[FILTER]
    Name              parser
    Match             *
    Key_Name          log
    Parser            json_app
    Reserve_Data      On
    Preserve_Key      Off

# Promote Docker metadata into consistent field names
[FILTER]
    Name              modify
    Match             *
    Rename            container_name service

[OUTPUT]
    Name              opensearch
    Match             *
    Host              opensearch
    Port              9200
    # One index per day: container-logs-YYYY.MM.DD
    Logstash_Format   On
    Logstash_Prefix   container-logs
    Suppress_Type_Name On
    # Use the structlog timestamp field as the OpenSearch document time
    Time_Key          @timestamp
    Generate_ID       On
    Retry_Limit       3
