global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: sentiment-backend
    # Backend runs on the host machine; host.docker.internal resolves from inside
    # Docker on both macOS/Windows (Docker Desktop) and Linux.
    static_configs:
      - targets:
          - host.docker.internal:8000
    metrics_path: /metrics
