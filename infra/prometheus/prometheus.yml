global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: sentiment-backend
    # When the backend runs inside Compose (the default), it is reachable on the
    # shared Docker network by its service name.  If you run the backend on the
    # host instead, replace "backend" with "host.docker.internal".
    static_configs:
      - targets:
          - backend:8000
    metrics_path: /metrics
