services:
  postgres:
    image: postgres:15-alpine
    container_name: sentiment-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localpassword}
      POSTGRES_DB: ${POSTGRES_DB:-advisor_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-advisor_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    build:
      context: ./opensearch
      dockerfile: Dockerfile
    container_name: sentiment-opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g
      - node.name=dev-node
      - cluster.name=sentiment-cluster
      - node.roles=data,master,ingest,ml
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - osdata:/usr/share/opensearch/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9200/_cluster/health || exit 1",
        ]
      interval: 30s
      timeout: 30s
      retries: 5

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:latest
    container_name: sentiment-opensearch-dashboards
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      opensearch:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    container_name: sentiment-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      # Webhook notification target — "primary" is the target ID
      MINIO_NOTIFY_WEBHOOK_ENABLE_primary: "on"
      # Backend runs on the Docker host; use host.docker.internal to reach it.
      # Override BACKEND_WEBHOOK_URL in .env if you run the backend inside Docker.
      MINIO_NOTIFY_WEBHOOK_ENDPOINT_primary: "${BACKEND_WEBHOOK_URL:-http://host.docker.internal:8000}/api/v1/audio/webhook"
      MINIO_NOTIFY_WEBHOOK_AUTH_TOKEN_primary: "${MINIO_WEBHOOK_SECRET:-change-me-in-production}"
    ports:
      - "9000:9000" # S3-compatible API
      - "9001:9001" # Web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot init: subscribe the audio bucket to the webhook target on first boot.
  minio-init:
    image: minio/mc:latest
    container_name: sentiment-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin} &&
        mc mb --ignore-existing myminio/$${MINIO_BUCKET:-audio-uploads} &&
        mc event add myminio/$${MINIO_BUCKET:-audio-uploads} arn:minio:sqs::primary:webhook --event s3:ObjectCreated:* || true &&
        echo 'MinIO bucket notification configured'
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-audio-uploads}


  # Observability — trace ingestion and query UI
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: sentiment-jaeger
    restart: unless-stopped
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:16686/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Observability — metrics scraping
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: sentiment-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: sentiment-backend
    restart: unless-stopped
    profiles:
      - backend
    # Run migrations then start the API server.
    # set -e ensures the container exits immediately if alembic fails.
    command: >
      sh -c "set -e;
             alembic upgrade head &&
             uvicorn app.main:create_app --factory --host 0.0.0.0 --port 8000"
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-localpassword}@postgres:5432/${POSTGRES_DB:-advisor_db}
      OPENSEARCH_URL: http://opensearch:9200
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-audio-uploads}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_EXTRACTION_MODEL: ${OLLAMA_EXTRACTION_MODEL:-llama3.2}
      OLLAMA_GENERATION_MODEL: ${OLLAMA_GENERATION_MODEL:-llama3.2}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WHISPER_MODEL: ${WHISPER_MODEL:-base.en}
      SCHEDULER_SECRET: ${SCHEDULER_SECRET:-change-me-in-production}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_ENDPOINT: ${OTEL_ENDPOINT:-http://jaeger:4318}
    extra_hosts:
      # Allows the container to reach Ollama running on the host machine.
      # On macOS/Windows with Docker Desktop, host.docker.internal resolves automatically;
      # this entry ensures Linux hosts also work.
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
  osdata:
  miniodata:
  promdata:
